<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Escena 3D educativa</title>
  <style>
    body { margin:0; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
  </style>
</head>
<body>

<!-- Three.js global -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/controls/OrbitControls.js"></script>

<script>
// ===== Escena y cámara =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

// ===== Renderizador =====
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== Controles =====
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// ===== Luz =====
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// ===== Objetos =====
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshStandardMaterial({ color:0x00ff00 })
);
cube.position.x = -2;
cube.userData.url = "https://es.wikipedia.org/wiki/Cubo";
scene.add(cube);

const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.7,32,32),
  new THREE.MeshStandardMaterial({ color:0x2194ce })
);
sphere.position.x = 2;
sphere.userData.url = "https://es.wikipedia.org/wiki/Esfera";
scene.add(sphere);

// Texto plano con enlace
const canvas = document.createElement('canvas');
canvas.width = 256; canvas.height = 128;
const ctx = canvas.getContext('2d');
ctx.fillStyle = "white";
ctx.font = "28px Arial";
ctx.fillText("Haz clic aquí", 20, 70);

const textMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(2,1),
  new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), side: THREE.DoubleSide })
);
textMesh.position.y = 2;
textMesh.userData.url = "https://www.google.com";
scene.add(textMesh);

// ===== Raycaster para clics =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener("click", (event)=>{
  mouse.x = (event.clientX/window.innerWidth)*2-1;
  mouse.y = -(event.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObjects(scene.children);
  if(intersects.length>0){
    const obj = intersects[0].object;
    if(obj.userData.url) window.open(obj.userData.url,"_blank");
  }
});

// ===== Animación =====
function animate(){
  requestAnimationFrame(animate);
  cube.rotation.x += 0.01;
  cube.rotation.y += 0.01;
  sphere.rotation.y += 0.01;
  renderer.render(scene,camera);
}
animate();

// ===== Ajuste de pantalla =====
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
